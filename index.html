<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Mobile FPS Arena</title>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; background: #aaddff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* 照準 */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 18px; height: 18px;
            border: 2px solid #fff; border-radius: 50%;
            transform: translate(-50%, -50%); mix-blend-mode: difference;
        }

        /* 共通ボタン設定 */
        .btn { 
            position: absolute; pointer-events: auto; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; user-select: none; 
            border: 2px solid rgba(255,255,255,0.4); 
            background: rgba(0,0,0,0.3); transition: transform 0.05s;
        }
        .btn:active { transform: scale(0.9); background: rgba(0,0,0,0.5); }

        /* 左手：ジョイスティック */
        #joystick-container { 
            bottom: 40px; left: 40px; width: 130px; height: 130px; 
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); 
            position: absolute; pointer-events: auto; background: rgba(255,255,255,0.1); 
            display: none;
        }
        #joystick-container.mobile-visible { display: block; }
        #joystick-knob { 
            position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; 
            background: rgba(255,255,255,0.4); border-radius: 50%; 
        }

        /* 右手：操作系 */
        #fire-button { bottom: 140px; right: 40px; width: 100px; height: 100px; background: rgba(255, 50, 50, 0.6); font-size: 20px; display: none; }
        #fire-button.mobile-visible { display: flex; }
        #jump-button { bottom: 40px; right: 160px; width: 80px; height: 80px; background: rgba(50, 150, 255, 0.6); display: none; }
        #jump-button.mobile-visible { display: flex; }
        #reload-button { bottom: 40px; right: 40px; width: 80px; height: 80px; background: rgba(80, 80, 80, 0.8); font-size: 13px; display: none; }
        #reload-button.mobile-visible { display: flex; }

        /* リロードUI */
        #reload-container {
            position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; text-align: center; display: none;
        }
        #reload-text { color: #ff3300; font-weight: bold; font-size: 14px; margin-bottom: 5px; text-shadow: 1px 1px 2px black; }
        #reload-bar-bg { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; }
        #reload-bar-fill { width: 0%; height: 100%; background: #00ffcc; }

        /* 情報表示 */
        #ammo-display { position: absolute; top: 20px; left: 20px; font-size: 28px; font-weight: bold; color: #222; text-shadow: 1px 1px 0 rgba(255,255,255,0.8); }
        
        /* PC操作ガイド */
        #controls-guide {
            position: absolute; bottom: 20px; right: 20px; color: #222; font-size: 12px;
            background: rgba(255,255,255,0.7); padding: 10px 15px; border-radius: 8px;
            text-align: right; line-height: 1.6;
        }
        #controls-guide.hidden { display: none; }

        /* iPad対応 */
        @supports (padding: max(0px)) {
            #joystick-container {
                bottom: max(40px, env(safe-area-inset-bottom));
                left: max(40px, env(safe-area-inset-left));
            }
            #fire-button {
                bottom: max(140px, calc(140px + env(safe-area-inset-bottom)));
                right: max(40px, env(safe-area-inset-right));
            }
            #jump-button {
                bottom: max(40px, env(safe-area-inset-bottom));
                right: max(160px, calc(160px + env(safe-area-inset-right)));
            }
            #reload-button {
                bottom: max(40px, env(safe-area-inset-bottom));
                right: max(40px, env(safe-area-inset-right));
            }
            #controls-guide {
                bottom: max(20px, env(safe-area-inset-bottom));
                right: max(20px, env(safe-area-inset-right));
            }
            #ammo-display {
                top: max(20px, env(safe-area-inset-top));
                left: max(20px, env(safe-area-inset-left));
            }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="ammo-display">15 / 15</div>
        
        <div id="reload-container">
            <div id="reload-text">RELOADING</div>
            <div id="reload-bar-bg"><div id="reload-bar-fill"></div></div>
        </div>

        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <div id="fire-button" class="btn">FIRE</div>
        <div id="jump-button" class="btn">JUMP</div>
        <div id="reload-button" class="btn">RELOAD</div>
        
        <div id="controls-guide">
            <div>WASD: 移動</div>
            <div>Mouse: 視点</div>
            <div>Click: 射撃</div>
            <div>Space: ジャンプ</div>
            <div>R: リロード</div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- デバイス判定 ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isTablet = /iPad|Android/i.test(navigator.userAgent) && window.innerWidth > 600;
        const isLandscape = window.innerWidth > window.innerHeight;
        
        // モバイルUIの表示制御
        if(isMobile) {
            document.getElementById('joystick-container').classList.add('mobile-visible');
            document.getElementById('fire-button').classList.add('mobile-visible');
            document.getElementById('jump-button').classList.add('mobile-visible');
            document.getElementById('reload-button').classList.add('mobile-visible');
            document.getElementById('controls-guide').classList.add('hidden');
        } else {
            document.getElementById('controls-guide').classList.remove('hidden');
        }

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xaaddff);
        scene.fog = new THREE.Fog(0xaaddff, 15, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const light = new THREE.HemisphereLight(0xffffff, 0x888888, 2.0);
        scene.add(light);

        // 床
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x999999}));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        scene.add(new THREE.GridHelper(100, 50, 0x888888, 0xaaaaaa));

        // --- 建物 & 障害物 ---
        const colliders = [];
        const wallMat = new THREE.MeshStandardMaterial({color: 0x556677});
        const containerMat = new THREE.MeshStandardMaterial({color: 0xaa4444});
        const windowMat = new THREE.MeshStandardMaterial({color: 0x4499ff});

        function addBox(x, z, w, h, d, mat) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            m.position.set(x, h/2, z);
            scene.add(m);
            colliders.push({ 
                minX: x-w/2, maxX: x+w/2, 
                minZ: z-d/2, maxZ: z+d/2,
                width: w, depth: d, height: h
            });
        }

        // ビルの構造
        function createBuilding(x, z, w, d, h, floors) {
            // 外壁
            addBox(x, z, w, h, d, wallMat);
            
            // 窓を表現するため、異なる高さの層を追加
            const floorHeight = h / floors;
            for(let i = 1; i < floors; i++) {
                const windowBox = new THREE.Mesh(
                    new THREE.BoxGeometry(w * 0.9, 0.1, d * 0.9),
                    windowMat
                );
                windowBox.position.set(x, floorHeight * i, z);
                scene.add(windowBox);
            }

            // 内部の床を表現
            for(let i = 0; i <= floors; i++) {
                const floorBox = new THREE.Mesh(
                    new THREE.BoxGeometry(w * 0.8, 0.05, d * 0.8),
                    new THREE.MeshStandardMaterial({color: 0x666666})
                );
                floorBox.position.set(x, floorHeight * i + 0.1, z);
                scene.add(floorBox);
            }
        }

        // マップ配置（小さくしたバージョン）
        createBuilding(0, -8, 6, 3, 12, 4);       // 中央ビル（高い）
        addBox(-10, -10, 5, 8, 5, wallMat);       // 左ビル
        addBox(10, -10, 5, 8, 5, wallMat);        // 右ビル
        addBox(0, -20, 8, 10, 4, wallMat);        // 奥の���物
        addBox(-5, -15, 2, 3, 4, containerMat);   // 赤コンテナ

        // --- 人型ダミー作成関数 ---
        function createDummy(x, z) {
            const dummyGroup = new THREE.Group();
            dummyGroup.position.set(x, 0, z);

            // 胴体
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1, 0.3), new THREE.MeshStandardMaterial({color: 0x4488ff}));
            body.position.y = 1;
            dummyGroup.add(body);

            // 頭
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshStandardMaterial({color: 0xffcc99}));
            head.position.y = 2;
            dummyGroup.add(head);

            // 腕
            const armMat = new THREE.MeshStandardMaterial({color: 0xffcc99});
            const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), armMat);
            leftArm.position.set(-0.4, 1.4, 0);
            dummyGroup.add(leftArm);
            const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), armMat);
            rightArm.position.set(0.4, 1.4, 0);
            dummyGroup.add(rightArm);

            // 脚
            const legMat = new THREE.MeshStandardMaterial({color: 0x222222});
            const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.9, 0.2), legMat);
            leftLeg.position.set(-0.15, 0.45, 0);
            dummyGroup.add(leftLeg);
            const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.9, 0.2), legMat);
            rightLeg.position.set(0.15, 0.45, 0);
            dummyGroup.add(rightLeg);

            scene.add(dummyGroup);

            return {
                group: dummyGroup,
                body: body,
                leftArm: leftArm,
                rightArm: rightArm,
                leftLeg: leftLeg,
                rightLeg: rightLeg,
                moveDir: Math.random() * Math.PI * 2,
                wanderTimer: 0,
                wanderInterval: 3 + Math.random() * 3,
                velocity: new THREE.Vector3(0, 0, 0),
                health: 3,
                isAlive: true
            };
        }

        // ダミー配列（数を減らした）
        const dummies = [];
        for(let i = 0; i < 3; i++) {
            let x, z, valid;
            do {
                valid = true;
                x = Math.random() * 30 - 15;
                z = -5 - Math.random() * 25;
                // 衝突判定で有効な位置か確認
                for(const c of colliders) {
                    if(x > c.minX - 2 && x < c.maxX + 2 && z > c.minZ - 2 && z < c.maxZ + 2) {
                        valid = false;
                        break;
                    }
                }
            } while(!valid);
            dummies.push(createDummy(x, z));
        }

        // --- ターゲット ---
        const targets = [];
        const tGeo = new THREE.IcosahedronGeometry(0.8, 0);
        const tMat = new THREE.MeshStandardMaterial({color: 0xff3300, emissive: 0xff0000, emissiveIntensity: 0.6});
        for(let i=0; i<8; i++) {
            const t = new THREE.Mesh(tGeo, tMat);
            t.position.set(Math.random()*30-15, 2 + Math.random()*4, -5 - Math.random()*25);
            scene.add(t);
            targets.push(t);
        }

        // --- プレイヤー & 銃 ---
        const gunGroup = new THREE.Group();
        const gun = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.15, 0.6), new THREE.MeshStandardMaterial({color: 0x222222}));
        gun.position.set(0.3, -0.3, -0.5);
        gunGroup.add(gun);
        camera.add(gunGroup);
        scene.add(camera);

        let ammo = 15, isReloading = false, reloadTimer = 0;
        const RELOAD_TIME = 0.85;
        let yaw = 0, pitch = 0, velocityY = 0, isGrounded = true;
        let moveF = 0, moveR = 0;
        const playerPos = new THREE.Vector3(0, 1.6, 10);
        const MOVE_SPEED = 0.38;
        const PLAYER_RADIUS = 0.5;

        // UI取得
        const reloadUI = document.getElementById('reload-container');
        const reloadBar = document.getElementById('reload-bar-fill');

        // --- キーボード入力 (PC) ---
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if(e.key === ' ') {
                e.preventDefault();
                if(isGrounded) {
                    velocityY = 0.36;
                    isGrounded = false;
                }
            }
            if(e.key.toLowerCase() === 'r') {
                e.preventDefault();
                startReload();
            }
        });
        window.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        // --- マウス操作 (PC) ---
        renderer.domElement.addEventListener('click', () => {
            if(!isMobile && document.body.requestPointerLock) {
                document.body.requestPointerLock();
            }
        });
        
        document.addEventListener('pointerlockchange', () => {
            console.log('Pointer lock:', document.pointerLockElement === document.body);
        });

        document.addEventListener('mousemove', e => {
            if(document.pointerLockElement === document.body) {
                yaw -= e.movementX * 0.005;
                pitch -= e.movementY * 0.005;
                pitch = Math.max(-1.45, Math.min(1.45, pitch));
            }
        });

        renderer.domElement.addEventListener('click', () => {
            if(!isMobile) shoot();
        });

        // タッチ状態管理
        const touchState = {
            lookTouchId: null,
            lookStartX: null,
            lookStartY: null
        };

        // --- 視点操作 (モバイル/iPad) ---
        window.addEventListener('touchstart', e => {
            for(const touch of e.touches) {
                // iPad: 右半分でも視点操作できるように調整
                const triggerPoint = isTablet ? window.innerWidth * 0.4 : window.innerWidth / 2;
                if(touch.clientX > triggerPoint && touchState.lookTouchId === null) {
                    touchState.lookTouchId = touch.identifier;
                    touchState.lookStartX = touch.clientX;
                    touchState.lookStartY = touch.clientY;
                    break;
                }
            }
        });

        window.addEventListener('touchmove', e => {
            for(const touch of e.touches) {
                if(touch.identifier === touchState.lookTouchId) {
                    yaw -= (touch.clientX - touchState.lookStartX) * 0.0055;
                    pitch -= (touch.clientY - touchState.lookStartY) * 0.0055;
                    pitch = Math.max(-1.45, Math.min(1.45, pitch));
                    touchState.lookStartX = touch.clientX;
                    touchState.lookStartY = touch.clientY;
                    break;
                }
            }
        });

        window.addEventListener('touchend', e => {
            for(const touch of e.changedTouches) {
                if(touch.identifier === touchState.lookTouchId) {
                    touchState.lookTouchId = null;
                    break;
                }
            }
        });

        // --- 移動ジョイスティック (モバイル/iPad) ---
        const joy = document.getElementById('joystick-container');
        const knob = document.getElementById('joystick-knob');
        let joyTouchId = null;

        joy.addEventListener('touchstart', e => {
            if(joyTouchId === null && e.touches.length > 0) {
                joyTouchId = e.touches[0].identifier;
            }
        });

        joy.addEventListener('touchmove', e => {
            e.preventDefault();
            for(const touch of e.touches) {
                if(touch.identifier === joyTouchId) {
                    const r = joy.getBoundingClientRect();
                    const dx = touch.clientX - (r.left + r.width/2);
                    const dy = touch.clientY - (r.top + r.height/2);
                    const dist = Math.sqrt(dx*dx+dy*dy);
                    const d = Math.min(dist, 50);
                    const a = dist > 0 ? Math.atan2(dy, dx) : 0;
                    knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                    moveR = (d/50) * Math.cos(a);
                    moveF = -(d/50) * Math.sin(a);
                    break;
                }
            }
        });

        joy.addEventListener('touchend', e => {
            for(const touch of e.changedTouches) {
                if(touch.identifier === joyTouchId) {
                    moveF = 0;
                    moveR = 0;
                    knob.style.transform = 'translate(0,0)';
                    joyTouchId = null;
                    break;
                }
            }
        });

        // --- 射撃 & リロード判定 ---
        const ray = new THREE.Raycaster();
        let lastShotTime = 0;
        const SHOT_COOLDOWN = 0.1; // 連射制限

        function shoot() {
            if(ammo <= 0 || isReloading) return;
            const now = Date.now() / 1000;
            if(now - lastShotTime < SHOT_COOLDOWN) return; // 連射制限

            lastShotTime = now;
            ammo--;
            document.getElementById('ammo-display').innerText = `${ammo} / 15`;
            gunGroup.position.z += 0.22; // 反動

            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            
            // ターゲット判定
            const hits = ray.intersectObjects(targets);
            if(hits.length > 0) {
                const o = hits[0].object;
                o.scale.set(0,0,0);
                setTimeout(() => { 
                    o.scale.set(1,1,1); 
                    o.position.set(Math.random()*30-15, 2+Math.random()*4, -5-Math.random()*25);
                }, 2000);
            }

            // ダミー判定
            for(const dummy of dummies) {
                if(!dummy.isAlive) continue;
                const allMeshes = [dummy.body, dummy.leftArm, dummy.rightArm, dummy.leftLeg, dummy.rightLeg];
                const dummyHits = ray.intersectObjects(allMeshes);
                if(dummyHits.length > 0) {
                    dummy.health--;
                    if(dummy.health <= 0) {
                        dummy.isAlive = false;
                        dummy.group.scale.set(0, 0, 0);
                    }
                    return;
                }
            }
        }

        function startReload() {
            if(!isReloading && ammo < 15) {
                isReloading = true;
                reloadTimer = 0;
                reloadUI.style.display = 'block';
            }
        }

        document.getElementById('fire-button').addEventListener('touchstart', e => { 
            e.preventDefault(); 
            shoot(); 
        });
        document.getElementById('jump-button').addEventListener('touchstart', e => { 
            e.preventDefault();
            if(isGrounded) {
                velocityY = 0.36;
                isGrounded = false;
            }
        });
        document.getElementById('reload-button').addEventListener('touchstart', e => { 
            e.preventDefault(); 
            startReload(); 
        });

        // --- 衝突判定 ---
        function checkCollision(x, z, radius) {
            for(const c of colliders) {
                // 矩形との距離を計算
                const closestX = Math.max(c.minX, Math.min(x, c.maxX));
                const closestZ = Math.max(c.minZ, Math.min(z, c.maxZ));
                const distX = x - closestX;
                const distZ = z - closestZ;
                const distSq = distX*distX + distZ*distZ;
                
                if(distSq < radius*radius) {
                    return true;
                }
            }
            return false;
        }

        // --- ダミーの更新 ---
        function updateDummies(delta) {
            for(const dummy of dummies) {
                if(!dummy.isAlive) continue;

                // ランダムに方向変更
                dummy.wanderTimer += delta;
                if(dummy.wanderTimer > dummy.wanderInterval) {
                    dummy.moveDir = Math.random() * Math.PI * 2;
                    dummy.wanderInterval = 2 + Math.random() * 4;
                    dummy.wanderTimer = 0;
                }

                // 移動（速度を小さくした）
                const moveSpeed = 0.08;
                const newX = dummy.group.position.x + Math.cos(dummy.moveDir) * moveSpeed;
                const newZ = dummy.group.position.z + Math.sin(dummy.moveDir) * moveSpeed;

                // 衝突判定
                if(!checkCollision(newX, newZ, 0.35)) {
                    dummy.group.position.x = newX;
                    dummy.group.position.z = newZ;
                    // 体の回転
                    dummy.group.rotation.y = dummy.moveDir;
                } else {
                    // 障害物に当たったら方向変更
                    dummy.moveDir = Math.random() * Math.PI * 2;
                }

                // 歩行アニメーション
                const walkCycle = (Date.now() * 0.01) % (Math.PI * 2);
                dummy.leftArm.rotation.z = Math.sin(walkCycle) * 0.3;
                dummy.rightArm.rotation.z = Math.sin(walkCycle + Math.PI) * 0.3;
                dummy.leftLeg.rotation.x = Math.sin(walkCycle) * 0.2;
                dummy.rightLeg.rotation.x = Math.sin(walkCycle + Math.PI) * 0.2;
            }
        }

        // --- メインループ ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

            // PC キーボード操作
            if(!isMobile) {
                moveF = 0;
                moveR = 0;
                if(keys['w']) moveF += 1;
                if(keys['s']) moveF -= 1;
                if(keys['a']) moveR -= 1;
                if(keys['d']) moveR += 1;
            }

            const fw = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); 
            fw.y = 0; 
            fw.normalize();
            const rt = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), fw).negate();
            
            const moveVec = new THREE.Vector3(
                fw.x * moveF + rt.x * moveR,
                0,
                fw.z * moveF + rt.z * moveR
            ).multiplyScalar(MOVE_SPEED);

            const nX = playerPos.x + moveVec.x;
            const nZ = playerPos.z + moveVec.z;

            // 軸分離衝突判定
            if(!checkCollision(nX, playerPos.z, PLAYER_RADIUS)) {
                playerPos.x = nX;
            }
            if(!checkCollision(playerPos.x, nZ, PLAYER_RADIUS)) {
                playerPos.z = nZ;
            }

            // 重力 & ジャンプ
            velocityY -= 0.019;
            playerPos.y += velocityY;
            if(playerPos.y <= 1.6) {
                playerPos.y = 1.6;
                velocityY = 0;
                isGrounded = true;
            }
            
            // リロード & 銃アニメーション
            if(isReloading) {
                reloadTimer += delta;
                const p = Math.min(reloadTimer / RELOAD_TIME, 1);
                reloadBar.style.width = (p * 100) + '%';
                gunGroup.position.y = Math.sin(p * Math.PI) * -0.65;
                if(reloadTimer >= RELOAD_TIME) {
                    isReloading = false;
                    ammo = 15;
                    document.getElementById('ammo-display').innerText = "15 / 15";
                    reloadUI.style.display = 'none';
                    gunGroup.position.y = 0;
                }
            } else {
                // 呼吸/反動復帰
                gunGroup.position.y = Math.sin(Date.now()*0.0025)*0.015;
                gunGroup.position.z += (0 - gunGroup.position.z) * 0.18;
            }

            // ダミーの更新
            updateDummies(delta);

            camera.position.copy(playerPos);
            renderer.render(scene, camera);
        }
        animate();

        // ウィンドウリサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
